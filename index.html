<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Footnote</title>
<link rel="icon" type="image/svg+xml" href="brand/footnote-mark.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
  :root { --accent:#2c64c4; --bg:#edf0f3; --card:#fff; --border:#e2e4e8; --text:#1f1e1c; --text-2:#605e58; --text-3:#8f8d84; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .hub-wrap { max-width:920px; margin:0 auto; padding:0 24px 80px; }
  .hub-topbar { display:flex; align-items:center; height:60px; }
  .hub-main { margin-top:18px; }
  .hub-head { display:flex; align-items:center; margin-bottom:18px; }
  .hub-title { font-size:15px; letter-spacing:.04em; color:var(--text-3); text-transform:uppercase; }
  .hub-btn { margin-left:auto; background:var(--card); border:.5px solid var(--border); border-radius:8px; padding:7px 13px; font-size:13px; cursor:pointer; color:var(--text); }
  .hub-primary { background:var(--accent); color:#fff; border-color:var(--accent); margin-left:0; }
  .hub-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .hub-card { display:block; background:var(--card); border:.5px solid var(--border); border-radius:12px; padding:16px; text-decoration:none; color:inherit; transition:border-color .15s; }
  .hub-card:hover { border-color:var(--accent); }
  .hub-card-name { font-size:15px; font-weight:600; margin-bottom:5px; }
  .hub-card-meta { font-size:12px; color:var(--text-3); }
  .hub-empty, .hub-loading { background:var(--card); border:1px dashed var(--border); border-radius:12px; padding:40px 28px; text-align:center; color:var(--text-2); max-width:520px; margin:6vh auto 0; }
  .hub-scrim { position:fixed; inset:0; background:rgba(0,0,0,.28); display:flex; align-items:center; justify-content:center; z-index:50; }
  .hub-sheet { background:var(--card); border-radius:14px; padding:22px; width:min(440px,92vw); }
  .hub-lab { display:block; font-size:12px; color:var(--text-2); margin-bottom:12px; }
  .hub-lab input { display:block; width:100%; margin-top:4px; padding:8px 10px; border:.5px solid var(--border); border-radius:8px; font-size:13px; }
  code { background:#f4f6f8; padding:1px 5px; border-radius:4px; font-size:.92em; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  import { launch } from './js/hub.js';
  launch();
</script>
</body>
</html>
