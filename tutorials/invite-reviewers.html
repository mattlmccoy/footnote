<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Footnote — Invite reviewers &amp; release chapters</title>
<link rel="icon" type="image/svg+xml" href="../brand/footnote-mark.svg">
<style>
:root{
  --accent:#2c64c4; --accent-2:#4f86e0; --ink:#1f1e1c; --ink-2:#605e58; --ink-3:#8f8d84;
  --card:#ffffff; --line:rgba(0,0,0,.09); --box:#f4f6f8; --ok:#0f6e56; --ok-bg:#e1f5ee;
  --warn:#8a5a00; --warn-bg:#fbf1d9; --warn-line:#e7cf93;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(1200px 700px at 50% -10%,#20264a 0%,#141830 45%,#0c0f1e 100%);
  color:var(--ink);min-height:100%;display:flex;align-items:center;justify-content:center;padding:26px 20px}
.wrap{width:1000px;max-width:96vw;height:min(680px,88vh);background:var(--card);color:var(--ink);
  border-radius:18px;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 40px 120px -30px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04)}
.tb{height:56px;flex:0 0 56px;display:flex;align-items:center;gap:11px;padding:0 20px;border-bottom:1px solid var(--line);background:#fafafa}
.tb .logo{width:24px;height:24px;border-radius:7px}
.tb .brand{font-weight:600;font-size:16px}
.tb .ctx{font-size:13px;color:var(--ink-2)}
.tb .learn{margin-left:auto;font-size:12.5px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:6px 11px;background:#fff;transition:.15s}
.tb .learn:hover{background:#eaf1fb}
.tb .prog{font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums;margin-left:14px}
#bar{height:3px;background:var(--accent);width:0;transition:width .4s cubic-bezier(.2,.7,.2,1);box-shadow:0 0 12px var(--accent)}
.main{flex:1;display:flex;min-height:0}
.rail{width:250px;flex:0 0 250px;border-right:1px solid var(--line);background:#fcfcfb;padding:18px 12px;overflow-y:auto}
.rail .rh{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);margin:4px 8px 12px}
.st{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:9px;margin-bottom:2px;cursor:pointer;transition:.15s;color:var(--ink-2)}
.st:hover{background:#f1f3f6}
.st.on{background:#eaf1fb;color:var(--ink);font-weight:600}
.st .num{width:22px;height:22px;flex:0 0 22px;border-radius:50%;border:1.5px solid var(--ink-3);display:flex;align-items:center;justify-content:center;font-size:11.5px;color:var(--ink-3);background:#fff;transition:.15s}
.st.on .num{border-color:var(--accent);background:var(--accent);color:#fff}
.st.done .num{border-color:var(--ok);background:var(--ok);color:#fff}
.st.done .num span{display:none}
.st.done .num::after{content:"✓";font-size:12px}
.st .lb{font-size:13px;line-height:1.25}
.content{flex:1;display:flex;flex-direction:column;min-height:0}
.scroll{flex:1;overflow-y:auto;padding:30px 40px 20px}
.eyebrow{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:9px}
h1{font-size:26px;font-weight:600;letter-spacing:-.5px;line-height:1.2;margin-bottom:8px}
.lead{font-size:15px;color:var(--ink-2);line-height:1.6;margin-bottom:22px;max-width:60ch}
h2{font-size:14px;font-weight:600;margin:22px 0 10px}
p{font-size:14px;line-height:1.68;color:#33322e;margin-bottom:12px;max-width:64ch}
ul{margin:0 0 14px 20px}
li{font-size:14px;line-height:1.7;color:#33322e;margin-bottom:7px;max-width:62ch}
b{font-weight:600;color:var(--ink)}
code{font-family:"SF Mono",Menlo,ui-monospace,monospace;font-size:12.5px;background:var(--box);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--ink)}
.acts{list-style:none;margin:6px 0 8px;padding:0;counter-reset:a}
.acts>li{position:relative;padding:2px 0 14px 40px;margin:0;counter-increment:a;max-width:64ch}
.acts>li::before{content:counter(a);position:absolute;left:0;top:0;width:26px;height:26px;border-radius:50%;background:#eaf1fb;color:var(--accent);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center}
.acts>li:not(:last-child)::after{content:"";position:absolute;left:13px;top:28px;bottom:2px;width:1.5px;background:var(--line)}
.note{border-radius:11px;padding:12px 15px;margin:14px 0;font-size:13px;line-height:1.6;display:flex;gap:11px;align-items:flex-start;max-width:64ch}
.note .ic{flex:0 0 auto;font-size:15px;line-height:1.4}
.note.info{background:#eef4fd;border:1px solid #cfe0f9;color:#2a3b57}
.note.warn{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn)}
.note.ok{background:var(--ok-bg);border:1px solid #bfe6d6;color:#0d5b46}
.note b{color:inherit}
/* mini in-app mockups */
.mock{border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 12px 30px -18px rgba(0,0,0,.3);padding:16px;margin:16px 0;max-width:64ch}
.mock .mh{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.mrow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-top:8px;font-size:13px}
.mrow .av{width:28px;height:28px;border-radius:50%;background:#e6f1fb;color:var(--accent);font-weight:600;font-size:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.mrow .nm{font-weight:500}.mrow .em{font-size:11.5px;color:var(--ink-3)}
.mrow .st2{margin-left:auto;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--ok-bg);color:var(--ok)}
.mx{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;margin-top:6px}
.mx th{font-size:10.5px;color:var(--ink-3);font-weight:500;padding:6px;text-align:center}
.mx td{padding:7px 6px;border-top:1px solid var(--line);color:var(--ink)}
.mx td:first-child{text-align:left;color:var(--ink-2)}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--ink-3);margin:0 auto}
.chk.on{background:var(--accent);border-color:var(--accent);position:relative}
.chk.on::after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.foot{flex:0 0 auto;border-top:1px solid var(--line);padding:14px 40px;display:flex;align-items:center;gap:12px;background:#fafafa}
.nav{font-size:13.5px;font-weight:500;border:1px solid var(--line);border-radius:9px;padding:9px 18px;background:#fff;color:var(--ink);cursor:pointer;transition:.15s}
.nav:hover{background:#f1f3f6}.nav:disabled{opacity:.4;cursor:not-allowed}
.nav.p{background:var(--accent);color:#fff;border-color:var(--accent)}.nav.p:hover{background:#2757ab}
.foot .sp{margin-left:auto}.foot .hint{font-size:12px;color:var(--ink-3)}
@media(max-width:720px){body{padding:0}.wrap{height:100vh;max-width:100vw;border-radius:0}.rail{display:none}.scroll{padding:22px 20px}.foot{padding:12px 20px}h1{font-size:22px}.tb .ctx,.tb .prog{display:none}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="tb">
      <img class="logo" src="../brand/footnote-mark.svg" alt="">
      <span class="brand">Footnote</span><span class="ctx">· Guide</span>
      <a class="learn" href="index.html"><i class="ti ti-arrow-left" style="font-size:14px"></i>All guides</a>
      <span class="prog" id="prog"></span>
    </div>
    <div id="bar"></div>
    <div class="main">
      <nav class="rail"><div class="rh">Steps</div><div id="steps"></div></nav>
      <div class="content">
        <div class="scroll" id="scroll"></div>
        <div class="foot">
          <button class="nav" id="back">← Back</button>
          <button class="nav p" id="next">Next →</button>
          <span class="sp"></span><span class="hint" id="hint"></span>
        </div>
      </div>
    </div>
  </div>
<script>
const STEPS = [
{ nav:'Overview', eyebrow:'Invite reviewers', title:'Reviewers read in Footnote, not Overleaf',
  body:`
  <p class="lead">Anyone you invite gets a clean, rendered reading surface with click-to-comment — no LaTeX, no Overleaf seat, and nothing to install. You control who sees what, and when.</p>
  <h2>What you'll do</h2>
  <ul>
    <li><b>Add reviewers</b> by name and email — each gets a private portal.</li>
    <li><b>Release chapters</b> per reviewer, on your own schedule.</li>
    <li><b>Send invites</b> automatically, or copy each link yourself.</li>
  </ul>
  <div class="note info"><span class="ic">◆</span><div>Everything here lives in the <b>owner portal → Reviewers</b> panel. Open your project, then find <b>Reviewers</b> in the top-bar menu.</div></div>` },

{ nav:'Add a reviewer', eyebrow:'Step 1', title:'Add a reviewer',
  body:`
  <p class="lead">Adding a reviewer creates their private portal and prepares an invite — it doesn't send anything yet.</p>
  <ol class="acts">
    <li>Open <b>Reviewers</b> and type the reviewer's <b>name</b> and <b>email</b>.</li>
    <li>Click <b>Add</b>. Footnote generates their private portal and shows them in the list.</li>
  </ol>
  <div class="mock">
    <div class="mh"><i class="ti ti-users"></i> Reviewers</div>
    <div class="mrow"><span style="flex:1;color:var(--ink-3)">Dr. Grace Hopper</span><span style="flex:1;color:var(--ink-3)">grace@lab.edu</span><span style="background:var(--accent);color:#fff;border-radius:7px;padding:4px 12px;font-size:12px;font-weight:600">Add</span></div>
    <div class="mrow"><span class="av">GH</span><div><div class="nm">Dr. Grace Hopper</div><div class="em">grace@lab.edu</div></div><span class="st2">invite ready</span></div>
  </div>
  <div class="note info"><span class="ic">◆</span><div>Reviewers are just a name + email to you. They never need a GitHub or Overleaf account.</div></div>` },

{ nav:'Release chapters', eyebrow:'Step 2', title:'Choose what each reviewer sees',
  body:`
  <p class="lead">You decide which chapters each reviewer can open. Share the introduction now, hold the rest until it's ready — nobody sees a chapter until you release it.</p>
  <ol class="acts">
    <li>In the <b>release</b> matrix, each row is a chapter and each column is a reviewer.</li>
    <li>Tick a box to give that reviewer access to that chapter. Untick to pull it back.</li>
  </ol>
  <div class="mock">
    <div class="mh"><i class="ti ti-adjustments-horizontal"></i> Release &middot; who sees what</div>
    <table class="mx"><thead><tr><th></th><th>Grace</th><th>Charles</th><th>Lab</th></tr></thead><tbody>
      <tr><td>1 · Introduction</td><td><div class="chk on"></div></td><td><div class="chk on"></div></td><td><div class="chk"></div></td></tr>
      <tr><td>2 · Background</td><td><div class="chk on"></div></td><td><div class="chk"></div></td><td><div class="chk"></div></td></tr>
      <tr><td>3 · Methods</td><td><div class="chk"></div></td><td><div class="chk"></div></td><td><div class="chk"></div></td></tr>
    </tbody></table>
  </div>
  <div class="note info"><span class="ic">◆</span><div>Release is reversible at any time. Un-releasing hides the chapter again; any comments a reviewer already left are kept.</div></div>` },

{ nav:'Send the invite', eyebrow:'Step 3', title:'Send the invite',
  body:`
  <p class="lead">Two ways to get the reviewer into their portal — pick whichever fits.</p>
  <h2>Option 1 — Let Footnote email it</h2>
  <p>Use the <b>Connect email</b> wizard once. It stores a few GitHub <b>Actions secrets</b> (your SMTP details + a least-privilege access key) so invites and update notifications send themselves.</p>
  <h2>Option 2 — Copy the link yourself</h2>
  <p>Grab the reviewer's portal link from their row and send it however you like — email, Slack, wherever.</p>
  <div class="note warn"><span class="ic">⚠</span><div>The reviewer's <b>access key</b> is emailed out, so it must be <b>least-privilege</b>: a fine-grained token scoped to <b>only</b> your data/workspace repo, Contents: Read and write. Never hand a reviewer a broad account token.</div></div>` },

{ nav:'What they see', eyebrow:'Step 4', title:'What the reviewer experiences',
  body:`
  <p class="lead">From the reviewer's side it's dead simple — and their feedback comes straight back to you.</p>
  <ol class="acts">
    <li>They open their link, enter the <b>access key</b> once, and land on the rendered document.</li>
    <li>They <b>highlight any text</b> and comment inline, or leave a suggested edit — shared instantly, no submit step.</li>
    <li>Comments appear on your side <b>live</b>, in the chapter's <b>From reviewers</b> rail. You reply, resolve, and they see how it was addressed.</li>
  </ol>
  <div class="note ok"><span class="ic">✓</span><div>That's the invite loop. Next: when you're ready to act on the feedback, see <b><a href="overleaf-worklist.html" style="color:inherit">Take feedback back to Overleaf →</a></b></div></div>` },
];

const scroll=document.getElementById('scroll'),stepsEl=document.getElementById('steps'),backB=document.getElementById('back'),nextB=document.getElementById('next'),bar=document.getElementById('bar'),progEl=document.getElementById('prog'),hintEl=document.getElementById('hint');
const KEY='footnote-guide-invite'; let seen=new Set(JSON.parse(localStorage.getItem(KEY)||'[]')); let i=0;
STEPS.forEach((s,n)=>{const el=document.createElement('div');el.className='st';el.innerHTML=`<span class="num"><span>${n+1}</span></span><span class="lb">${s.nav}</span>`;el.onclick=()=>go(n);stepsEl.appendChild(el);});
function paintRail(){[...stepsEl.children].forEach((el,n)=>{el.classList.toggle('on',n===i);el.classList.toggle('done',n!==i&&seen.has(n));});}
function render(){const s=STEPS[i];scroll.innerHTML=`<div class="eyebrow">${s.eyebrow}</div><h1>${s.title}</h1>${s.body}`;scroll.scrollTop=0;bar.style.width=((i+1)/STEPS.length*100)+'%';progEl.textContent=`Step ${i+1} of ${STEPS.length}`;backB.disabled=i===0;nextB.textContent=i===STEPS.length-1?'Done ✓':'Next →';hintEl.textContent=i===STEPS.length-1?'Revisit anytime from All guides.':'';paintRail();}
function go(n){seen.add(i);localStorage.setItem(KEY,JSON.stringify([...seen]));i=Math.max(0,Math.min(STEPS.length-1,n));render();}
backB.onclick=()=>go(i-1);
nextB.onclick=()=>{if(i<STEPS.length-1)go(i+1);else{seen.add(i);localStorage.setItem(KEY,JSON.stringify([...seen]));paintRail();}};
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key==='ArrowRight')nextB.click();if(e.key==='ArrowLeft'&&i>0)go(i-1);});
render();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
</body>
</html>
