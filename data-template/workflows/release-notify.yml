name: release-notify
# When the owner changes release.json (releases chapters or responses), email affected advisors.
on:
  push:
    branches: [main]
    paths: ['release.json', '*/release.json']
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: release-notify
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Advisor emails
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          REPLY_TO: ${{ vars.REPLY_TO }}
          AUTHOR_NAME: ${{ vars.AUTHOR_NAME }}
          DOC_NOUN: ${{ vars.DOC_NOUN }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          OWNER_PORTAL_FILE: ${{ vars.OWNER_PORTAL_FILE }}
          PORTAL_BASE: ${{ vars.PORTAL_BASE }}
        run: python3 ci_notify_advisors.py
      - name: Commit notify state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # stage each file only if it exists — `git add a b` aborts (stages NOTHING) when ANY pathspec
          # matches no file, so in workspace mode (no root notify_state.json) the old form never staged state
          for f in notify_state.json */notify_state.json; do [ -f "$f" ] && git add "$f"; done
          if git diff --cached --quiet; then echo "no state change"; else
            git commit -m "notify: update state [skip ci]"
            for attempt in 1 2 3 4 5; do
              git push && exit 0
              echo "push rejected — rebasing (attempt $attempt)"; git pull --rebase origin main || { git rebase --abort || true; break; }
            done
            echo "::error::release-notify writeback push failed after retries — state not persisted; re-run to reconcile" >&2
            exit 1
          fi
