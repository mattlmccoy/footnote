name: invite

# Emails an invite to each newly-added advisor when the reviewer app writes advisors.json.
on:
  push:
    branches: [main]
    # legacy repo: root advisors.json; consolidated workspace repo: <project-id>/advisors.json
    paths: ['advisors.json', 'email_test_request.json', '*/advisors.json', '*/email_test_request.json']
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send one test email to this address (leave blank for a normal invite run)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: invite
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Any pending invites?
        id: check
        run: |
          TEST=""
          if [ -n "${{ github.event.inputs.test_email }}" ]; then
            TEST="${{ github.event.inputs.test_email }}"
          else
            # a test request may sit at the root (legacy) or in any project subfolder (workspace)
            for req in email_test_request.json */email_test_request.json; do
              [ -f "$req" ] || continue
              TEST="$(jq -r '.to // ""' "$req" 2>/dev/null)"; [ -n "$TEST" ] && break
            done
          fi
          if [ -n "$TEST" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
            echo "test_email=$TEST" >> "$GITHUB_OUTPUT"
            echo "test send to $TEST"
          else
            GO=false
            # any pending invite in the root or any project subfolder?
            for reg in advisors.json */advisors.json; do
              [ -f "$reg" ] || continue
              if jq -e '[.advisors[]? | select(.email != null and .email != "" and (.invited != true))] | length > 0' "$reg" >/dev/null 2>&1; then GO=true; break; fi
            done
            if [ "$GO" = true ]; then echo "go=true" >> "$GITHUB_OUTPUT"; else echo "go=false" >> "$GITHUB_OUTPUT"; echo "No pending invites."; fi
          fi

      - name: Send invites
        if: steps.check.outputs.go == 'true'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          ADVISOR_KEY: ${{ secrets.ADVISOR_KEY }}
          AUTHOR_NAME: ${{ vars.AUTHOR_NAME }}
          DOC_NOUN: ${{ vars.DOC_NOUN }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          OWNER_PORTAL_FILE: ${{ vars.OWNER_PORTAL_FILE }}
          PORTAL_BASE: ${{ vars.PORTAL_BASE }}
          TEST_EMAIL: ${{ steps.check.outputs.test_email }}
        run: python3 ci_invite.py

      - name: Commit invite status
        if: steps.check.outputs.go == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch email_test_request.json */email_test_request.json >/dev/null 2>&1 || true
          git add advisors.json */advisors.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "no status change"; else
            git commit -m "invite: update advisor invite status [skip ci]"
            # the browser may have written advisors.json since checkout — rebase onto the remote and retry
            for attempt in 1 2 3; do
              git push && break
              echo "push rejected — rebasing (attempt $attempt)"; git pull --rebase origin main || { git rebase --abort; break; }
            done
          fi
