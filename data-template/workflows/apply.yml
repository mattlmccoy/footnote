name: apply
# Drain the review job queue on the ADOPTER's own Actions. Handles the DETERMINISTIC apply-direct
# job (an owner's verbatim edit — no Claude, works with the AI assistant off) and the Claude
# apply-edits job (freeform comments → Claude-authored LaTeX edit specs, applied deterministically
# and staged for the author to approve — never auto-merged) and the author-triggered merge job
# (publish ONLY the approved edits to main, rebuild content/<unit>.html, drop the review branch).
# run-agents lands in a later slice. Dual-mode: legacy root or workspace <id>/. Claude jobs run only
# when Claude Code is connected — a subscription token (CLAUDE_CODE_OAUTH_TOKEN, recommended) or an
# ANTHROPIC_API_KEY; otherwise the job just waits.
on:
  # The app enqueues by committing jobs.json (workspace: <id>/jobs.json). The drain commits the
  # updated queue + reviews back with [skip ci], so this never loops.
  push:
    paths:
      - 'jobs.json'
      - '*/jobs.json'
  workflow_dispatch:
    inputs:
      project:
        description: 'Project id to process (blank = all projects in this repo)'
        required: false
        default: ''
  repository_dispatch:
    types: [apply]
permissions:
  contents: write
concurrency:
  # Serialize queue drains so two runs never fight over the same jobs.json / review branch.
  group: apply
  cancel-in-progress: false
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need main history to branch review-edits/<unit> off it
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install pandoc + TeX + poppler (the preview reuses the render pipeline)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc poppler-utils \
            texlive-latex-base texlive-latex-extra texlive-pictures texlive-science
      - name: Install Claude Code CLI (used by apply-edits/run-agents when Claude is connected)
        run: npm install -g @anthropic-ai/claude-code || echo "claude CLI unavailable — Claude jobs will wait"
      - name: Sync to latest main before draining
        # checkout@v4 lands on the SHA that triggered the run, which is behind a prior serialized run's
        # [skip ci] drain commit. Draining that stale jobs.json makes the whole-file writeback conflict on
        # rebase (and the old loop silently dropped it). With the `apply` concurrency group serializing
        # runs, resetting to the current tip means this run drains the up-to-date queue and its writeback
        # fast-forwards cleanly.
        run: |
          REF="${GITHUB_REF_NAME:-main}"
          git fetch origin "$REF"
          git checkout -B "$REF" "origin/$REF"
      - name: Drain review job queue
        env:
          SOURCE_TOKEN: ${{ secrets.SOURCE_TOKEN }}
          SOURCE_REPO: ${{ vars.SOURCE_REPO }}
          # RECOMMENDED: a Claude Code subscription token (`claude setup-token`, Pro/Max/Team/Enterprise).
          # Usage counts against the subscription — no API bill. The headless CLI reads it automatically.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # ALTERNATIVE: a raw Anthropic API key (billed per token). Either one enables Claude jobs.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          # Cost levers set in Settings → Cloud model & budget. CRITIC_MODEL runs the read-only critics on a
          # cheaper model (defaults to Sonnet in the engine); the caps stop a job before it burns tokens.
          CRITIC_MODEL: ${{ vars.CRITIC_MODEL }}
          COST_CAP_USD: ${{ vars.COST_CAP_USD }}
          MAX_CLAUDE_CALLS: ${{ vars.MAX_CLAUDE_CALLS }}
          PROJECT: ${{ github.event.inputs.project }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 ci_apply.py
      - name: Commit queue + review writeback
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          REF="${GITHUB_REF_NAME:-main}"
          git add -A
          if git diff --cached --quiet; then
            echo "no queue changes"; exit 0
          fi
          git commit -m "apply: drain review queue [skip ci]"
          for attempt in 1 2 3 4 5; do
            git push origin "HEAD:$REF" && exit 0
            echo "push rejected — rebasing onto latest (attempt $attempt)"
            # a concurrent [skip ci] push (e.g. render committing content/) touches different files, so the
            # rebase is clean; if it ever conflicts, abort and fail LOUDLY rather than dropping the writeback.
            git pull --rebase origin "$REF" || { git rebase --abort || true; break; }
          done
          echo "::error::writeback push failed after retries — the job stays queued (branch may already be pushed); re-dispatch apply to reconcile" >&2
          exit 1
