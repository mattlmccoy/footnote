name: notify
# Twice-daily: email the author a digest of new advisor activity, and sweep any late
# resolutions out to advisors under the substance floor. Sends nothing when nothing is new.
on:
  schedule:
    - cron: '0 14 * * *'   # ~9am US Eastern
    - cron: '0 22 * * *'   # ~5pm US Eastern
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: notify
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Author digest
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          AUTHOR_NAME: ${{ vars.AUTHOR_NAME }}
          PORTAL_BASE: ${{ vars.PORTAL_BASE }}
        run: python3 ci_notify_author.py
      - name: Advisor late-resolution sweep
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          AUTHOR_NAME: ${{ vars.AUTHOR_NAME }}
          PORTAL_BASE: ${{ vars.PORTAL_BASE }}
        run: python3 ci_notify_advisors.py
      - name: Commit notify state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notify_state.json
          if git diff --cached --quiet; then echo "no state change"; else
            git commit -m "notify: update state [skip ci]"
            for attempt in 1 2 3; do
              git push && break
              echo "push rejected — rebasing (attempt $attempt)"; git pull --rebase origin main || { git rebase --abort; break; }
            done
          fi
