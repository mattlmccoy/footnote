<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Footnote</title>
<link rel="icon" type="image/svg+xml" href="brand/footnote-mark.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
:root{
  --bg:#ffffff; --bg-2:#faf9f7; --bg-3:#f1efe9; --text:#1f1e1c; --text-2:#605e58; --text-3:#8f8d84;
  --border:rgba(0,0,0,.10); --border-2:rgba(0,0,0,.16); --accent:#2c64c4; --accent-bg:#eaf1fb;
  --info:#185fa5; --info-bg:#e6f1fb; --success:#0f6e56; --success-bg:#e1f5ee; --warn:#9a6a12; --warn-bg:#faf0d8;
  --danger:#b3261e; --danger-bg:#fbe9e7;
  --r-sm:7px; --r-md:9px; --r-lg:13px;
  --claim:#0c447c; --claim-bg:#e6f1fb; --figure:#3c3489; --figure-bg:#edebfb;
  --wording:#44443f; --wording-bg:#efece4; --citation:#72243e; --citation-bg:#fbe9ef; --question:#7a4a09; --question-bg:#f9efd8;
  --suggestion:#1c6b4a; --suggestion-bg:#e4f3ec; --clarity:#0d5a66; --clarity-bg:#e0f1f4;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
}
.dark{
  --bg:#1b1a18; --bg-2:#222120; --bg-3:#2b2a27; --text:#f4f2ec; --text-2:#b1afa6; --text-3:#85837b;
  --border:rgba(255,255,255,.12); --border-2:rgba(255,255,255,.20); --accent:#6aa0ec; --accent-bg:#1b2c44;
  --info:#7fb3ec; --info-bg:#17283d; --success:#69c6a3; --success-bg:#11362c; --warn:#e0b15e; --warn-bg:#3a2f17;
  --danger:#f2b8b5; --danger-bg:#3a1d1b;
  --claim:#bcd6f5; --claim-bg:#17293f; --figure:#c9c2f2; --figure-bg:#262147;
  --wording:#cdcbc2; --wording-bg:#33322e; --citation:#f0b6c8; --citation-bg:#3a2029; --question:#ecc483; --question-bg:#3a2f17;
  --suggestion:#a6dcc4; --suggestion-bg:#16302a; --clarity:#a3d6df; --clarity-bg:#15303a;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
*{scrollbar-width:thin;scrollbar-color:var(--border-2) transparent}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:7px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
::-webkit-scrollbar-track{background:transparent}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
.icbtn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:var(--r-md);color:var(--text-2)}
.icbtn:hover{background:var(--bg-3);color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:.5px solid var(--border-2);border-radius:var(--r-md);font-size:13px;font-weight:500}
.btn:hover{background:var(--bg-2)} .btn:active{transform:scale(.985)}
.btn-primary{background:var(--text);color:var(--bg);border-color:transparent}
.btn-primary:hover{opacity:.9;background:var(--text)}
.chip{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;letter-spacing:.01em}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:12px;height:56px;flex:0 0 56px;padding:0 16px;border-bottom:.5px solid var(--border);background:var(--bg-2)}
.chsel{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:500;padding:5px 8px;border-radius:var(--r-md)}
.chsel:hover{background:var(--bg-3)}
.search{flex:1;max-width:440px;display:flex;align-items:center;gap:9px;height:38px;padding:0 13px;border:.5px solid var(--border);border-radius:var(--r-md);background:var(--bg);color:var(--text-3);font-size:13px}
.search input{flex:1;border:none;background:none;outline:none;font:inherit;color:var(--text)}
.panes{flex:1;display:flex;min-height:0}
.nav{flex:0 0 210px;border-right:.5px solid var(--border);overflow:auto;padding:18px 10px}
.nav .lbl{display:flex;font-size:11px;letter-spacing:.08em;color:var(--text-3);padding:0 8px 10px}
.nav a{display:flex;align-items:center;gap:6px;padding:7px 9px;border-radius:var(--r-sm);color:var(--text-2);font-size:13.5px;cursor:pointer;line-height:1.35;margin-bottom:1px}
.nav a .chk{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;font-size:15px;color:var(--text-3);border-radius:50%}
.nav a .chk:hover{color:var(--accent)} .nav a .chk.on{color:var(--success)}
.nav a .nav-t{flex:1;min-width:0}
.nav a:hover{background:var(--bg-2);color:var(--text)}
.nav a.sub{padding-left:24px;font-size:13px;color:var(--text-3)}
.nav a.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav .count{margin-left:auto;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;border-radius:10px;background:var(--bg-3);color:var(--text-2);padding:0 6px}
.nav a.active .count{background:var(--bg);color:var(--accent)}
.read{flex:1;min-width:0;overflow:auto;position:relative}
#doc{max-width:720px;margin:0 auto;padding:34px 28px 160px;font-size:16.5px;line-height:1.78;color:var(--text)}
#doc h1{font-size:26px;font-weight:600;letter-spacing:-.01em;margin:0 0 20px}
#doc h2{font-size:21px;font-weight:600;letter-spacing:-.005em;margin:36px 0 12px}
#doc h3{font-size:17px;font-weight:600;margin:26px 0 8px;color:var(--text)}
#doc p{margin:0 0 16px} #doc strong{font-weight:600}
#doc img{max-width:100%;height:auto;display:block;margin:18px auto;border:.5px solid var(--border);border-radius:var(--r-sm)}
#doc figure{margin:24px 0} #doc figcaption{font-size:13.5px;color:var(--text-2);margin-top:8px;text-align:center;line-height:1.5}
#doc table{border-collapse:collapse;width:100%;margin:20px 0;font-size:14.5px;line-height:1.5}
#doc table caption{caption-side:top;font-size:13.5px;color:var(--text-2);text-align:left;margin-bottom:8px;line-height:1.5}
#doc th,#doc td{border:.5px solid var(--border);padding:7px 11px;text-align:left;vertical-align:top}
#doc thead th{background:var(--bg-2);font-weight:600;border-bottom:1px solid var(--border-2)}
#doc tbody tr:nth-child(even){background:var(--bg-2)}
#doc #footnotes{font-size:13.5px;color:var(--text-2);border-top:.5px solid var(--border);margin-top:36px;padding-top:8px}
#doc #footnotes h2.fn-h{font-size:15px;margin:8px 0 6px;color:var(--text)}
#doc #footnotes ol{padding-left:20px;margin:0} #doc #footnotes li{margin:6px 0}
#doc .footnote-ref{font-size:.75em;vertical-align:super;line-height:0;color:var(--accent);text-decoration:none;padding:0 1px;cursor:pointer}
#doc .footnote-ref:hover{text-decoration:underline}
#doc a.footnote-back{text-decoration:none;color:var(--accent);margin-left:4px}
.fn-tip{position:absolute;z-index:25;width:min(360px,80%);background:var(--bg);border:.5px solid var(--accent);border-radius:var(--r-md);padding:11px 13px;box-shadow:0 8px 28px rgba(0,0,0,.16);font-size:13.5px;line-height:1.5;color:var(--text-2)}
.fn-tip-h{font-size:11px;letter-spacing:.04em;color:var(--text-3);text-transform:uppercase;margin-bottom:5px}
#doc .cite-link{color:var(--accent);cursor:pointer;border-radius:3px;padding:0 1px} #doc .cite-link:hover{background:var(--accent-bg)}
.cite-tip{position:absolute;z-index:26;width:min(440px,88%);max-height:300px;overflow:auto;background:var(--bg);border:.5px solid var(--accent);border-radius:var(--r-md);padding:10px 13px;box-shadow:0 8px 28px rgba(0,0,0,.18);font-size:12.5px;line-height:1.5;color:var(--text-2)}
.cite-tip .cite-entry{padding:5px 0;text-indent:0} .cite-tip .cite-entry + .cite-entry{border-top:.5px solid var(--border);margin-top:2px} .cite-tip .cite-entry a{color:var(--accent)}
.fn-tip p{margin:0}
#doc .references,#doc #refs{font-size:13.5px;color:var(--text-2);border-top:.5px solid var(--border);margin-top:36px;padding-top:16px}
#doc ::selection{background:rgba(60,120,230,.22)}
#doc a.xref{color:var(--accent);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--accent) 35%,transparent);cursor:pointer}
#doc a.xref:hover{border-bottom-color:var(--accent);background:var(--accent-bg)}
.flash{background:var(--warn-bg);border-radius:3px;transition:background .3s}
.comments{flex:0 0 320px;border-left:.5px solid var(--border);background:var(--bg-2);overflow:auto;padding:16px 14px}
.comments .lbl{display:flex;font-size:11px;letter-spacing:.06em;color:var(--text-3);margin-bottom:12px}
.ccard{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-md);padding:11px 12px;margin-bottom:10px;cursor:pointer}
.ccard:hover{border-color:var(--border-2)}
.ccard .row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.ccard .snip{font-size:12px;font-style:italic;color:var(--text-3);margin-bottom:6px;line-height:1.4}
.ccard .body{font-size:13.5px;line-height:1.5}
.ccard .branch{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2);margin-top:8px}
.status{margin-left:auto;font-size:10.5px;font-weight:500;padding:1px 9px;border-radius:20px}
.popover{position:absolute;z-index:20;width:min(560px,90%);background:var(--bg);border:.5px solid var(--accent);border-radius:var(--r-lg);padding:13px 15px;box-shadow:0 8px 30px rgba(0,0,0,.14)}
.popover .head{display:flex;align-items:center;font-size:11.5px;color:var(--text-2)}
.popover .loc{margin-left:auto;display:inline-flex;align-items:center;gap:5px;color:var(--success);font-weight:500}
.popover .snip{font-style:italic;font-size:13px;color:var(--text-3);border-left:2px solid var(--border-2);padding-left:10px;margin:9px 0}
.popover .tags{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.popover .tags button{font-size:11.5px;padding:3px 11px;border-radius:20px;border:.5px solid var(--border);color:var(--text-2)}
.popover .tags button.on{border-color:transparent}
.popover textarea{width:100%;border:.5px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font:inherit;background:var(--bg);color:var(--text);resize:vertical;min-height:46px;outline:none}
.popover textarea:focus{border-color:var(--accent)}
.empty{max-width:440px;margin:16vh auto;text-align:center;color:var(--text-2)}
.katex{font-size:1.02em}
/* release page */
.rel-page{max-width:760px;margin:0 auto;padding:26px 24px 90px}
.rel-sec{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin:0 0 12px}
.rel-tbl{width:100%;border-collapse:collapse;font-size:13px} .rel-tbl th,.rel-tbl td{border-bottom:.5px solid var(--border);padding:7px 9px;text-align:left} .rel-tbl th{font-size:12px;font-weight:600}
.rel-tbl input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.rel-links{margin-top:8px;font-size:11.5px;color:var(--text-2);line-height:1.7} .rel-links code{background:var(--bg-3);padding:1px 6px;border-radius:5px;font-size:11px}
.rel-inbox{margin-bottom:18px} .rel-inbox-h{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px}
.rel-cmt{border:.5px solid var(--border);border-radius:var(--r-md);padding:11px 13px;margin-bottom:9px;background:var(--bg-2)}
.rel-cmt-h{font-size:11.5px;color:var(--text-3);display:flex;align-items:center;margin-bottom:5px}
.rel-cmt-q{font-size:12.5px;font-style:italic;color:var(--text-3);border-left:2px solid var(--border-2);padding-left:9px;margin-bottom:6px}
.rel-cmt-b{font-size:13.5px;line-height:1.5}
.rel-cmt.is-read{opacity:.86} .rel-cmt.is-read .rel-cmt-h{color:var(--text-2)}
.rel-read{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;color:var(--text-3);margin-right:7px;cursor:pointer;user-select:none} .rel-read input{margin:0;cursor:pointer}
.rel-acts{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap} .rel-acts .btn{padding:3px 9px;font-size:11.5px}
.rel-acts .rel-send:not([disabled]){border-color:var(--accent);color:var(--accent)}
.rel-pop{margin-top:7px;border-top:.5px dashed var(--border);padding-top:8px} .rel-pop textarea,.rel-pop select{width:100%;font:inherit;font-size:12.5px;color:var(--text);background:var(--bg);border:.5px solid var(--border);border-radius:6px;padding:6px 8px;outline:none;margin-bottom:6px}
.rel-popacts{display:flex;gap:6px} .rel-popacts .btn{padding:4px 11px;font-size:12px}
.rel-note{margin-top:6px;font-size:12.5px;line-height:1.45;color:var(--text-2);background:var(--bg-3);border-left:2px solid var(--warn);border-radius:0 6px 6px 0;padding:5px 9px}
.cdec{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.cdec-b{padding:3px 9px;font-size:11.5px}
.cdec-b.on-approve{border-color:var(--success);color:var(--success);background:var(--success-bg)}
.cdec-b.on-reject{border-color:var(--danger);color:var(--danger);background:var(--danger-bg)}
.cdec-b.on-revise{border-color:var(--warn);color:var(--warn);background:var(--warn-bg)}
.cqd-grp{margin-top:14px;border-top:.5px solid var(--border)}
.cqd-head{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--success);padding:10px 2px 6px}
.cqd-head .rcount{margin-left:auto;background:var(--success-bg);color:var(--success);border-radius:10px;padding:0 7px;font-size:10.5px}
.cunq{padding:3px 9px;font-size:11.5px}
span.cqd{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--success)}
/* slim overview rows in the releases panel */
.rel-row{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border:.5px solid var(--border);border-radius:var(--r-md);margin-bottom:6px;background:var(--bg-2)} .rel-row.is-read{opacity:.72}
.rel-row .rel-read{margin:2px 0 0} .rel-row-main{flex:1;min-width:0} .rel-row-h{font-size:11.5px;color:var(--text-3);display:flex;align-items:center;gap:6px;flex-wrap:wrap} .rel-row-h .chip{font-size:10px}
.rel-row-q{font-size:12.5px;color:var(--text-2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap} .rel-row .rel-open{padding:3px 9px;font-size:11.5px;white-space:nowrap;flex-shrink:0}
/* in-context advisor card actions */
.adv .advacts{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap} .adv .advacts .btn{padding:3px 9px;font-size:11.5px}
.adv .advacts .a-send:not([disabled]){border-color:var(--accent);color:var(--accent)}
.adv.is-read{opacity:.9}
.sug-passage{font-size:12px;color:var(--text-3);margin-bottom:7px} .sug-passage blockquote{margin:4px 0;padding:4px 9px;border-left:2px solid var(--border-2);font-style:italic;color:var(--text-2)}
.resol{margin-top:8px;padding:8px 10px;border-radius:var(--r-sm);font-size:12.5px;line-height:1.5;background:var(--bg-3)}
.resol-h{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;margin-bottom:4px}
.resol-addressed{background:var(--success-bg)} .resol-addressed .resol-h{color:var(--success)}
.resol-declined .resol-h{color:var(--text-2)} .resol-noted{background:var(--accent-bg)} .resol-noted .resol-h{color:var(--accent)}
.resol del{color:var(--danger);text-decoration:line-through} .resol ins{color:var(--success);text-decoration:none;background:var(--success-bg);border-radius:2px;padding:0 2px}
.rform{margin-top:8px;border-top:.5px dashed var(--border);padding-top:8px} .rform select,.rform textarea{width:100%;font:inherit;font-size:12.5px;color:var(--text);background:var(--bg);border:.5px solid var(--border);border-radius:6px;padding:6px 8px;outline:none;margin-bottom:6px}
/* advisor comments surfaced in the owner rail */
.lbl.adv-lbl{display:flex;margin-top:18px;border-top:.5px solid var(--border);padding-top:12px}
.ccard.adv{border-left:2.5px solid var(--figure)}
.chip.advchip{background:color-mix(in srgb,var(--figure) 16%,transparent);color:var(--figure)}
.advacts{display:flex;gap:6px;margin-top:8px}
#doc mark.cmark-adv{background:color-mix(in srgb,var(--figure) 18%,transparent);border-bottom:1.5px solid var(--figure)}
#doc mark.cmark-adv.cmark-hot{outline:1.5px solid var(--figure);outline-offset:1px}
/* suggestion (track-changes) */
:root{ --edit:#0f6e6e; --edit-bg:#e0f3f1; --suggest:#0f6e56; }
.dark{ --edit:#6fc7c2; --edit-bg:#123230; --suggest:#69c6a3; }
.btn-suggest{background:var(--suggest);color:#fff;border-color:transparent} .btn-suggest:hover{opacity:.9;background:var(--suggest)}
.pmodes{display:flex;gap:2px;background:var(--bg-3);border-radius:var(--r-sm);padding:3px;margin:10px 0}
.pmodes button{flex:1;padding:4px 6px;border-radius:5px;font-size:11.5px;color:var(--text-2)}
.pmodes button.on{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.popover textarea.crepl{width:100%;border:.5px solid var(--suggest);border-radius:var(--r-sm);padding:8px 10px;font:inherit;background:var(--bg);color:var(--text);resize:vertical;min-height:44px;outline:none;margin-bottom:8px}
/* proposed outline (read-only, owner) */
.ol-wrap{max-width:760px;margin:0 auto;padding:30px 26px 90px}
.ol-h1{font-size:24px;font-weight:600;margin:0 0 8px}
.ol-intro{font-size:13.5px;line-height:1.6;color:var(--text-2);margin:0 0 14px}
.ol-chapter{border:.5px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;overflow:hidden}
.ol-chead{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;cursor:pointer} .ol-chead:hover{background:var(--bg-2)}
.ol-chev{font-size:17px;color:var(--text-3);transition:transform .15s;flex:0 0 auto;margin-top:1px} .ol-chapter.open .ol-chev{transform:rotate(90deg)}
.ol-cn{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--accent-bg);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-top:1px}
.ol-ctitle{font-size:14.5px;font-weight:500;line-height:1.35} .ol-csyn{font-size:12px;color:var(--text-3);margin-top:2px;line-height:1.4}
.ol-sections{display:none;padding:0 15px 6px 48px} .ol-chapter.open .ol-sections{display:block}
.ol-node{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-top:.5px solid var(--border)}
.ol-node.ol-sec{position:relative}
.ol-node.ol-sub{padding-left:18px;border-top:none;padding-top:3px;padding-bottom:3px}
.ol-node.ol-sub .ol-slabel{font-size:12.5px;color:var(--text-2)}
.ol-srow{flex:1;min-width:0} .ol-slabel{font-size:13px;color:var(--text)} .ol-syn{display:block;font-size:11.5px;color:var(--text-3);margin-top:1px;line-height:1.4}
.ol-node.ol-sub::before{content:"";position:absolute;margin-left:-12px;margin-top:8px;width:6px;height:6px;border-left:1px solid var(--border-2);border-bottom:1px solid var(--border-2)}
.ol-cmt{flex:0 0 auto;display:inline-flex;align-items:center;gap:3px;border:.5px solid var(--border);background:var(--bg);border-radius:14px;padding:2px 9px;font:inherit;font-size:11.5px;color:var(--text-2);cursor:pointer}
.ol-cmt:hover{border-color:var(--accent);color:var(--accent)} .ol-cmt i{font-size:14px}
.ol-composer{margin:2px 0 8px 48px;display:flex;flex-direction:column;gap:7px}
.ol-composer textarea{width:100%;border:.5px solid var(--accent);border-radius:7px;padding:7px 9px;font:inherit;font-size:13px;background:var(--bg);color:var(--text);resize:vertical;outline:none}
.ol-cactions{display:flex;gap:7px}
.rel-fup{font-size:12.5px;line-height:1.45;color:var(--text);background:var(--accent-bg);border-left:2px solid var(--accent);border-radius:0 6px 6px 0;padding:5px 9px;margin-top:6px}
.cmeta{color:var(--text-3);font-size:11px;font-style:normal}
/* chapter history — old-vs-new diff */
