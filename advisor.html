<body>
<div class="app">
  <header class="topbar" id="topbar"></header>
  <div class="panes">
    <nav class="nav" id="nav"></nav>
    <section class="read" id="read"></section>
    <aside class="comments" id="comments"></aside>
  </div>
</div>
<script>
  (function () {
    var q = new URLSearchParams(location.search);
    var id = (q.get('a') || '').trim();
    var name = (q.get('n') || '').trim();
    // A document link carries the reviewer id (?a=). A BARE entry (no id, no data, no project) is the
    // reviewer Home — always load the module so it can list the reviewer's remembered documents. The
    // module routes: id/data/p present → open that document (unchanged); bare → Home.
    window.ADVISOR = id ? { id: id, name: name || id } : null;
    var s = document.createElement('script');
    s.type = 'module'; s.src = './js/advisor.js?v=8ee2e14';
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
