name: cachebust

# Stamp every ?v= asset token (HTML + JS module imports) with the commit SHA on each push,
# so a changed file always gets a new URL and browser/CDN caches bust automatically.
# No more hand-editing ?v= tokens.
on:
  push:
    branches: [main]
    paths: ['**.html', 'js/**.js', 'css/**.css']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cachebust
  cancel-in-progress: false

jobs:
  bust:
    runs-on: ubuntu-latest
    # skip runs triggered by this workflow's own bot commit (no infinite loop). The bot commit has
    # no [skip ci] so GitHub Pages still deploys the freshly-stamped assets.
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v4

      - name: Stamp asset versions with per-file content hashes
        # Content-hash each ?v= token (via scripts/cachebust_hash.py) so a file's URL changes ONLY when it
        # or one of its transitive imports changes — no more false "newer version available" nags on pushes
        # that don't touch a given bundle. A changed dependency still busts every dependent's cache.
        run: |
          python3 - <<'PY'
          import glob, sys
          sys.path.insert(0, "scripts")
          from cachebust_hash import stamp
          paths = sorted(set(glob.glob("*.html") + glob.glob("js/**/*.js", recursive=True) + glob.glob("css/**/*.css", recursive=True)))
          files = {p: open(p, encoding="utf-8").read() for p in paths}
          out = stamp(files)
          for p, c in out.items():
              if c != files[p]:
                  open(p, "w", encoding="utf-8").write(c); print("stamped", p)
          PY

      - name: Commit stamped versions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "nothing to stamp"; else
            git commit -m "chore: cache-bust assets (per-file content hash)"
            git push
          fi
