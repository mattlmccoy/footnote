name: test
on:
  push:
    branches: [main]
    paths: ['js/**', 'scripts/**', 'tests/**', 'data-template/**', 'footnote.config*.json', 'package.json']
  pull_request:
  workflow_dispatch:
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run unit tests
        run: node --test tests/*.test.mjs
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Run CI-email tests (data-template is document-agnostic)
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest tests/test_ci_email.py -q
      - name: Advisor bundle is assistant-free (grep gate)
        run: |
          # advisor.js + every shell that loads it (advisor.html, review-lab.html, generated <id>.html)
          shells=$(grep -l 'advisor.js' *.html 2>/dev/null || true)
          if grep -aiEr 'claude|anthropic|\bAI\b|\bagent\b|gpt|llm|copilot' js/advisor.js $shells 2>/dev/null; then
            echo "::error::assistant reference found in the advisor bundle"; exit 1
          fi
          echo "advisor bundle clean"
